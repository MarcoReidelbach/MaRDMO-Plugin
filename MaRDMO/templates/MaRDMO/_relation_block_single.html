<h3 id="{{ anchor }}">Relations to {{ title }}</h3>
{% for models in relatants.values %}
    {% if models == 'not found' %}
        {{ relation }}: <strong style="color:red;">SELECTED {{ class }} NOT FOUND IN {{ class }} SECTION</strong> <br>
    {% else %}
        {{ relation }}: {{ models }} <br>
    {% endif %}
{% empty %}
    <strong style="color:red;">MISSING {{ class }}</strong>
{% endfor %}
